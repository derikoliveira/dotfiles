# ==============================================================================
# PLUGINS
# ==============================================================================
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tpm'

# ==============================================================================
# GENERAL
# ==============================================================================
set -g default-command "${SHELL}"
set-option -g detach-on-destroy off

# ==============================================================================
# PREFIX KEY
# ==============================================================================
# Change prefix from Ctrl+b to Alt+q
unbind-key C-b
set-option -g prefix M-q
bind-key M-q send-prefix

# ==============================================================================
# STATUS BAR
# ==============================================================================
set -g status-style bg=default
set -g status-left ""
set -g status-right "#[fg=#78DCE8]#S"
set -g window-status-current-format " #[bold]#I "
set -g window-status-current-style "bg=#A9DC76,fg=black"
set -g window-status-format " #I "

# ==============================================================================
# WINDOW & PANE INDEXING
# ==============================================================================
# Start windows and panes at 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ==============================================================================
# MOUSE SUPPORT
# ==============================================================================
set-option -g mouse on

# ==============================================================================
# COPY MODE
# ==============================================================================
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ==============================================================================
# KEY BINDINGS
# ==============================================================================

# Split panes with more intuitive keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ==============================================================================
# PLUGIN INITIALIZATION
# ==============================================================================
# Initialize tmux plugin manager (keep this line at the very bottom)
run '$XDG_CONFIG_HOME/tmux/plugins/tpm/tpm'
