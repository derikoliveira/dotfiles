# ==============================================================================
# PLUGINS
# ==============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'christoomey/vim-tmux-navigator'

# ==============================================================================
# GENERAL
# ==============================================================================
set -g default-command "${SHELL}"

# ==============================================================================
# PREFIX KEY
# ==============================================================================
# Change prefix from Ctrl+b to Alt+q
unbind-key C-b
set-option -g prefix M-q
bind-key M-q send-prefix

# ==============================================================================
# STATUS BAR
# ==============================================================================
set -g status-style bg=default
set -g status-left ""
set -g status-right "#[fg=#78DCE8]#S"
set -g window-status-current-format " #[bold]#I "
set -g window-status-current-style "bg=#A9DC76,fg=black"
set -g window-status-format " #I "

# ==============================================================================
# WINDOW & PANE INDEXING
# ==============================================================================
# Start windows and panes at 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ==============================================================================
# MOUSE SUPPORT
# ==============================================================================
set-option -g mouse on

# ==============================================================================
# KEY BINDINGS
# ==============================================================================

# Split panes with more intuitive keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Window navigation
bind-key -n M-Left previous-window
bind-key -n M-Right next-window

# Direct window selection with Alt + number
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ==============================================================================
# PLUGIN INITIALIZATION
# ==============================================================================
# Initialize tmux plugin manager (keep this line at the very bottom)
run '$XDG_CONFIG_HOME/tmux/plugins/tpm/tpm'
