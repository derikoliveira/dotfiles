[font.normal]
family = "JetBrains Mono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrains Mono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrains Mono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrains Mono Nerd Font"
style = "Bold Italic"

[font.offset]
x = 0
y = 0

[general]
import = ["monokai-pro-alacritty.toml"]

[window]
padding = { x = 10, y = 5 }
decorations = "none"
opacity = 0.95
dynamic_padding = true
